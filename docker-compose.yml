services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    volumes:
      - ./data/todos.db:/app/todos.db

  frontend:
    build: ./frontend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
